<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Dialihkan - SMK MAPAG</title>
    <meta http-equiv="refresh" content="5;url=https://smkmapag.vercel.app/ayosekolah">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background Gradient Segar */
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        h1 {
            color: #2d5a27;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        p {
            color: #444;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #62c1ad;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-manual {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(98, 193, 173, 0.8);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-manual:hover {
            background: rgba(98, 193, 173, 1);
            transform: translateY(-2px);
        }

        .countdown {
            font-size: 0.9rem;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="loader"></div>
        <h1>Ups! Halaman Tidak Tersedia</h1>
        <p>Halaman yang Anda tuju sedang dalam pemeliharaan atau telah dipindahkan. Anda akan diarahkan secara otomatis ke halaman <strong>Ayo Sekolah</strong>.</p>
        
        <a href="https://smkmapag.vercel.app/ayosekolah" class="btn-manual">Klik di sini jika tidak beralih</a>
        
        <div class="countdown">
            Mengarahkan dalam <span id="seconds">5</span> detik...
        </div>
    </div>

    <script>
        // Script sederhana untuk visual countdown
        let timeLeft = 5;
        const countdownElem = document.getElementById('seconds');
        
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                countdownElem.textContent = timeLeft;
            }
        }, 1000);
    </script>

</body>
</html>
